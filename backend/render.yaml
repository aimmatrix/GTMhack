# Render Blueprint — one-command deploy
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: lightfern-reach-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8787"
      - key: CORS_ORIGIN
        value: "*"
      - key: SEARCH_PROVIDER
        value: mock
      - key: LLM_PROVIDER
        value: mock
      - key: HANDOFF_MODE
        value: compose_link
      # Optional — flip to live providers when ready:
      # - key: UNIFY_API_KEY
      #   sync: false
      # - key: GEMINI_API_KEY
      #   sync: false
      # - key: SUPABASE_URL
      #   sync: false
      # - key: SUPABASE_KEY
      #   sync: false
