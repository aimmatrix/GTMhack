<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noodle - Lightfern Reach</title>
    <meta
      name="description"
      content="Noodle finds warm matches, prepares research context, and hands it to Lightfern for drafting."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%237b6cff'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial' font-size='24' font-weight='700' fill='white'%3EN%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/landing.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="/" aria-label="Noodle home">Noodle</a>
      <a class="header-link" href="/dashboard/">Open app</a>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-prism" data-prism aria-hidden="true"></div>
        <div class="hero-inner" data-reveal>
          <h1 id="hero-title">Own Your<br />Outreach.</h1>
          <p>
            Noodle helps you describe who you want to reach, find high-signal
            people or businesses, and package the research context Lightfern
            needs to draft a strong email.
          </p>
          <div class="reach-entry">
            <form class="reach-form" action="/dashboard/" method="get" data-reach-form>
              <input type="hidden" name="run" value="1" />
              <label class="reach-field" aria-label="Who should Noodle find?">
                <input
                  name="target"
                  type="text"
                  autocomplete="off"
                  required
                  placeholder="Peter at Stripe"
                />
              </label>
              <button class="waitlist-button" type="submit" aria-label="Let's reach out">
                <span>Let's reach out</span>
                <span aria-hidden="true">→</span>
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/js/landing.js"></script>
  </body>
</html>
